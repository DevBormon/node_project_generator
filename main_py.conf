[program:main_py]
command=/bin/bash -c 'cd /path/to/your/project && ./run_main.sh'
directory=/path/to/your/project
user=your_username
autostart=true
autorestart=true
startsecs=5
startretries=3
stopasgroup=true
killasgroup=true
stderr_logfile=/var/log/main_py.err.log
stdout_logfile=/var/log/main_py.out.log
environment=PATH="/path/to/your/project/venv/bin:%(ENV_PATH)s"


